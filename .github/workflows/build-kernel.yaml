name: 🚀 Build Android Open Source Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: "📱 Select target kernel and its devices"
        required: true
        type: choice
        options:
          - muzel
          - lga
          - akita
          - bluejay
          - caimito
          - comet
          - deepspace
          - felix
          - gs101
          - gs201
          - lynx
          - pantah
          - raviole
          - shusky
          - tangorpro
          - tegu
          - zuma
          - zumapro

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🧱 Prepare environment
        run: |
          sudo apt update
          sudo apt install -y git python3 python-is-python3 gnupg flex bison build-essential libssl-dev \
            libncurses-dev zip unzip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo

      - name: 🔍 Debug Environment
        run: |
          echo "Current directory: $(pwd)"
          ls -l setup_tools.sh make_zip.sh build_kernel_and_package.sh
          ls -l tools/bazel
          ls -l build/kernel/kleaf/bazel.sh || echo "build/ directory missing!"
          which python
          python --version

      - name: ⚙️ Build Kernel and Package AnyKernel3
        run: |
          # 1. Setup AnyKernel3 tools
          chmod +x setup_tools.sh make_zip.sh build_kernel_and_package.sh
          chmod +x build/kernel/kleaf/bazel.sh || true
          ./setup_tools.sh

          # 2. Build kernel using the unified script
          ./build_kernel_and_package.sh ${{ github.event.inputs.device }}

          # 3. zip will be created by build_kernel_and_package.sh (which calls make_zip.sh)
          # The zip naming pattern is pixel10-kernel-aosp-${DEVICE}-YYYYMMDD_HHMM.zip
          echo "zip_path=$(ls pixel10-kernel-aosp-${{ github.event.inputs.device }}-*.zip | head -1)" >> $GITHUB_ENV
        shell: bash

      - name: 🧬 Detect kernel version
        id: version
        run: |
          IMAGE_PATH="magisk_package/Image"
          if [[ -f "$IMAGE_PATH" ]]; then
            VERSION=$(strings "$IMAGE_PATH" | grep "Linux version" | head -n1 | awk '{print $3}')
          else
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected kernel version: $VERSION"

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.event.inputs.device }}-${{ steps.version.outputs.version }}-${{ github.run_id }}"
          name: "Kernel ${{ steps.version.outputs.version }} for ${{ github.event.inputs.device }}"
          body: |
            🧬 **Kernel version:** `${{ steps.version.outputs.version }}`
            📱 **Target Device:** `${{ github.event.inputs.device }}`
            🔖 **Release Type:** Magisk / AnyKernel3 Flashable ZIP
            ⚙️ **Commit:** `${{ github.sha }}`
          files: |
            ${{ env.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
